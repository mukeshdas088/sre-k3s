---
- name: Install k3s and Show Nodes Directly
  hosts: k3s_nodes
  become: true
  tasks:
    - name: 1. Execute k3s installation script via curl
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: 2. Show live cluster nodes layout
      ansible.builtin.shell: kubectl get nodes -o wide
      register: k3s_nodes_output
      changed_when: false

    - name: 3. Print live nodes stdout
      ansible.builtin.debug:
        var: k3s_nodes_output.stdout_lines
