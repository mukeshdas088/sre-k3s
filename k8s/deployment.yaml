apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-helloworld
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-helloworld
  template:
    metadata:
      labels:
        app: nginx-helloworld
    spec:
      containers:
      - name: nginx
        image: nginx:stable-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: nginx-helloworld-html
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-helloworld-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: nginx-helloworld
