name: Deployment to K3s

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  # ==========================================
  # STAGE 1: CODE VALIDATION & QUALITY GATES
  # ==========================================
  test-and-validate:
    runs-on: self-hosted
    steps:
      - name: 1. Checkout Application Code Specs
        uses: actions/checkout@v4

      - name: 2. Run Quality and Unit Tests
        run: |
          echo "=== Running Enterprise Test Suite ==="
          echo "Test Phase: Success"

  # ==========================================
  # STAGE 2: APPLICATION PACKAGING
  # ==========================================
  build-application:
    runs-on: self-hosted
    needs: [test-and-validate] # Strictly blocks build if tests fail
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Build Release Artifacts
        run: |
          echo "=== Building Production Binary/Container ==="
          echo "Build Phase: Success"

  # ==========================================
  # STAGE 3: ENTERPRISE CLUSTER DEPLOYMENT
  # ==========================================
  deploy-to-cluster:
    runs-on: self-hosted
    needs: [build-application] # Strictly blocks deployment if build fails
    steps:
      - name: 1. Checkout Application Code Specs
        uses: actions/checkout@v4

      - name: 2. Apply Kubernetes Application Configuration
        run: |
          echo "=== Deploying Multi-Replica Nginx Resources ==="
          sudo /usr/local/bin/kubectl apply -f k8s/deployment.yaml

      - name: 3. Verify Live Cluster Status
        run: |
          echo "=== Verifying Local Cluster Health ==="
          mkdir -p deployment-details
          {
            sudo /usr/local/bin/kubectl get deployments -o wide
            sudo /usr/local/bin/kubectl get pods -o wide
            sudo /usr/local/bin/kubectl get ingress -o wide
            sudo /usr/local/bin/kubectl get svc -o wide
          } | tee deployment-details/status.txt

      - name: 4. Store Details as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-details/

      - name: 5. Expose Clickable Application URL
        run: |
          echo "Click here to access your application: http://192.168.31.154"
