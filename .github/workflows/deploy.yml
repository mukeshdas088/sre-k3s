name: Continuous Deployment to k3s

on:
  push:
    branches:
      - main

jobs:
  deploy-to-cluster:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4.2.2  # Upgraded package target

    - name: Authenticate with Cluster
      uses: azure/k8s-set-context@v4.0.1  # Upgraded syntax to clear Node warning
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Verify Cluster Compute Nodes
      run: |
        echo "=== Checking Target Cluster Infrastructure Nodes ==="
        kubectl get nodes -o wide

    - name: Apply Kubernetes Configuration
      run: |
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/deployment.yaml
