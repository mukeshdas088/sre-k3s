name: Continuous Deployment to k3s

on:
  push:
    branches:
      - main

jobs:
  deploy-to-cluster:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout Application Code Specs
      uses: actions/checkout@v4.2.2

    - name: 2. Authenticate Context with Cluster
      uses: azure/k8s-set-context@v4.0.1
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: 3. Verify Cluster Compute Nodes Natively
      run: |
        echo "=== Checking Target Cluster Infrastructure Nodes ==="
        # Natively connects using the authenticated vault profile over TLS
        kubectl get nodes -o wide

    - name: 4. Apply Kubernetes Application Configuration
      run: |
        echo "=== Deploying Multi-Replica Nginx Resources ==="
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/deployment.yaml
