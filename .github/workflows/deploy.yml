name: Simple Local File Listing

on:
  push:
    branches:
      - main

jobs:
  list-local-files:
    # Forces the workflow to run on your local machine instead of the cloud
    runs-on: self-hosted

    steps:
    - name: 1. Checkout Git Code Specs
      uses: actions/checkout@v4.2.2

    - name: 2. List Files on the Remote Linux Host VM
      run: |
        echo "=== Querying Files in /home/system Natively ==="
        # Since the runner is local, it can securely reach out to your VM's private IP
        ssh -o StrictHostKeyChecking=no system@192.168.31.154 "ls -la /home/system"
