---
- name: Install k3s, Show Nodes, and Fetch Kubeconfig
  hosts: k3s_nodes
  become: true  # Executes tasks via passwordless sudo
  tasks:
    - name: 1. Execute k3s installation script via curl
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: 2. Show live cluster nodes layout
      ansible.builtin.shell: kubectl get nodes -o wide
      register: k3s_nodes_output
      changed_when: false

    - name: 3. Print live nodes stdout
      ansible.builtin.debug:
        var: k3s_nodes_output.stdout_lines

    # --- THE MISSING STEP ADDED HERE ---
    - name: 4. Fetch cluster config back to your Mac controller
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ./kubeconfig-raw
        flat: true
